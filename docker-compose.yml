services:
  web-dev: 
    container_name: app_dashboard_web_dev
    build: 
      context: . 
      dockerfile: Dockerfile 
      target: dev 
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules 
    ports: 
      - "3000:3000"
    depends_on:
      - mongo
  web-prod: 
    container_name: app_dashboard_web_prod
    build: 
      context: . 
      dockerfile: Dockerfile 
      target: prod 
    environment:
      - NODE_ENV=production
    ports:
      - "4000:3000"
    depends_on: 
      - mongo

  mongo:
    image: mongo:6
    container_name: app_dashboard_mongo
    restart: always
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    entrypoint: [ "sh", "-c", "mongod --replSet rs0 --bind_ip_all & sleep 5 && mongosh --eval 'try { rs.status() } catch (e) { rs.initiate() }' && wait" ]

volumes:
  mongo_data:
