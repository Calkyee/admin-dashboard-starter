version: "3.9"

services:
  web:
    build: .
    container_name: app_dashboard_web
    command: npm run dev:docker
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - TURBOPACK_WATCH_MODE=poll
      - TURBOPACK_POLL_INTERVAL=500

    stdin_open: true
    tty: true

  mongo:
    image: mongo:6
    container_name: app_dashboard_mongo
    restart: always
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    entrypoint: [ "sh", "-c", "mongod --replSet rs0 --bind_ip_all & sleep 5 && mongosh --eval 'try { rs.status() } catch (e) { rs.initiate() }' && wait" ]

volumes:
  mongo_data:
